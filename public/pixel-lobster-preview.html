// ===== 绘制函数 =====
function drawSprite(ctx, sprite, ox, oy, scale, blink) {
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  
  for (let y = 0; y < 64; y++) {
    const row = sprite[y];
    if (!row) continue;
    for (let x = 0; x < 64; x++) {
      const c = row[x];
      let color = null;
      switch (c) {
        case 'O': color = '#1a0505'; break;
        case 'D': color = '#4a1010'; break;
        case 'B': color = '#881818'; break;
        case 'R': color = '#cc2222'; break;
        case 'H': color = '#ee4444'; break;
        case 'C': color = '#d43525'; break;
        case 'L': color = '#ff6644'; break;
        case 'W': 
          color = blink ? '#dddddd' : '#ffffff'; 
          break; // 眨眼时白眼变灰
        case 'K': 
          color = blink ? '#444444' : '#111111'; 
          break; // 眨眼时黑瞳变大
        case 'G': color = '#888888'; break;
        case 'Y': color = '#ffcc33'; break;
        case ' ': case 'T': continue;
      }
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(ox + x * scale, oy + y * scale, scale, scale);
      }
    }
  }
  
  // 眼白覆盖（眨眼动画）
  if (blink) {
    // 在眼睛位置画一条水平线模拟闭眼
    const eyeY = oy + 21 * scale;
    const eyeLX = ox + 17 * scale;
    const eyeRX = ox + 41 * scale;
    ctx.fillStyle = '#cc2222'; // 身体色
    [eyeLX, eyeRX].forEach(ex => {
      ctx.fillRect(ex, eyeY + scale, scale * 7, scale, scale);
      ctx.fillRect(ex - scale, eyeY + scale*2, scale * 9, scale, scale);
    });
  }
}

// ===== 动画循环 =====
const c1 = document.getElementById('c1');
const c2 = document.getElementById('c2');
const c3 = document.getElementById('c3');
const ctx1 = c1.getContext('2d');
const ctx2 = c2.getContext('2d');
const ctx3 = c3.getContext('2d');

const SCALE = 3;
const OX = (192 - 64*SCALE) / 2;
const OY = (192 - 64*SCALE) / 2;

let frame = 0;
let walkFrame = 0;

function animate() {
  frame++;
  
  // 待机：每120帧眨眼一次
  const blink = (frame % 120) > 115;
  drawSprite(ctx1, SPRITE_IDLE, OX, OY, SCALE, blink);
  
  // 攻击姿态：钳子张合
  const attackIntensity = Math.sin(frame * 0.05) * 0.5 + 0.5;
  ctx2.save();
  drawSprite(ctx2, SPRITE_ATTACK, OX, OY, SCALE, false);
  // 攻击姿态钳子抖动
  ctx2.globalAlpha = 0.15;
  ctx2.fillStyle = '#ff6644';
  // 左钳高光闪烁
  ctx2.fillRect(OX + 4*SCALE, OY + 9*SCALE, SCALE*6, SCALE);
  ctx2.fillRect(OX + 52*SCALE, OY + 9*SCALE, SCALE*6, SCALE);
  ctx2.restore();
  
  // 走路循环
  walkFrame = (walkFrame + 1) % 40;
  const walkSprite = walkFrame < 20 ? SPRITE_WALK1 : SPRITE_IDLE;
  const bobY = Math.sin(walkFrame / 20 * Math.PI) * 2; // 上下弹跳
  drawSprite(ctx3, walkSprite, OX, OY + bobY, SCALE, (frame % 120) > 115);
  
  requestAnimationFrame(animate);
}
