<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 像素龙虾最终版预览</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#0a0a1a;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    color:#e0e0e0;
    gap:24px;
    padding:40px 20px;
  }
  h2{
    background:linear-gradient(135deg,#00D4FF,#9B59B6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    font-size:1.8rem;
    text-align:center;
  }
  .subtitle{color:rgba(255,255,255,0.4);font-size:0.9rem;margin-top:-16px}
  
  /* 场景容器 */
  .scene-box{
    position:relative;
    width:400px;
    height:400px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 60px rgba(0,212,255,0.15);
    border:2px solid rgba(255,255,255,0.08);
  }
  .room-bg{
    width:100%;
    height:100%;
    object-fit:cover;
    image-rendering:pixelated;
  }
  
  /* 龙虾角色 - 最终版 */
  .lobster{
    position:absolute;
    width:100px;
    height:100px;
    bottom:60px;
    right:80px;
    image-rendering:pixelated;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,0.6));
    animation:lobster-breathe 2s ease-in-out infinite;
    object-fit:none;
    object-position:0 0;
  }
  @keyframes lobster-breathe{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-3px);}
  }
  
  /* 对话气泡 */
  .bubble{
    position:absolute;
    bottom:160px;
    right:60px;
    background:rgba(18,18,42,0.95);
    border:1px solid rgba(0,212,255,0.4);
    border-radius:12px;
    padding:10px 14px;
    font-size:0.8rem;
    color:#00D4FF;
    max-width:160px;
    opacity:0;
    animation:bubble-pop 4s ease-in-out infinite;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
  }
  .bubble::after{
    content:'';
    position:absolute;
    bottom:-8px;
    right:24px;
    border-left:8px solid transparent;
    border-right:8px solid transparent;
    border-top:8px solid rgba(0,212,255,0.4);
  }
  @keyframes bubble-pop{
    0%,70%,100%{opacity:0;transform:translateY(10px);}
    15%,55%{opacity:1;transform:translateY(0);}
  }
  
  /* 控制按钮 */
  .controls{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .btn{
    padding:10px 18px;
    background:linear-gradient(135deg,#00B4D8,#9B59B6);
    border:none;
    border-radius:8px;
    color:#fff;
    font-weight:600;
    font-size:0.85rem;
    cursor:pointer;
    transition:all 0.2s;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,180,216,0.4);}
  .btn.active{box-shadow:inset 0 2px 8px rgba(0,0,0,0.3);}
  
  /* 最终版展示 */
  .final-card{
    background:rgba(18,18,42,0.6);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:24px;
    text-align:center;
    max-width:600px;
  }
  .final-card img{
    width:320px;
    height:320px;
    object-fit:contain;
    image-rendering:pixelated;
    border-radius:8px;
  }
  .final-card p{margin-top:12px;font-size:0.85rem;color:rgba(255,255,255,0.5)}
  
  /* 标签 */
  .tags{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
  .tag{background:rgba(0,180,216,0.15);color:#00D4FF;padding:4px 12px;border-radius:20px;font-size:0.75rem}
  
  @media(max-width:480px){
    .scene-box{width:100%;max-width:340px;height:340px}
    .lobster{width:80px;height:80px;bottom:50px;right:60px}
    .bubble{bottom:130px;right:40px;font-size:0.7rem}
    .final-card img{width:280px;height:280px}
  }
</style>
</head>
<body>
<h2>🦞 像素龙虾 v5 最终版</h2>
<p class="subtitle">扇形尾扇 · 无腿 · 强壮双钳</p>

<!-- 场景预览 -->
<div class="scene-box">
  <img src="pixel-room/Pixel_art_room_scene__isometri_2026-06-01T12-10-50.png" class="room-bg" alt="像素房间">
  <img src="pixel-room/Pixel_art_lobster_spritesheet__2026-06-01T13-03-22.png" class="lobster" id="lobster" alt="龙虾">
  <div class="bubble">你好！我是码坚强的像素助手🦞</div>
</div>

<!-- 帧切换 -->
<div class="controls">
  <button class="btn active" onclick="setFrame(0,this)">🧍 待机</button>
  <button class="btn" onclick="setFrame(1,this)">💪 双钳</button>
  <button class="btn" onclick="setFrame(2,this)">🌊 展尾</button>
  <button class="btn" onclick="setFrame(3,this)">👋 挥手</button>
</div>

<!-- 最终版精灵表 -->
<div class="final-card">
  <img src="pixel-room/Pixel_art_lobster_spritesheet__2026-06-01T13-03-22.png" alt="龙虾精灵表">
  <div class="tags">
    <span class="tag">扇形尾扇</span>
    <span class="tag">无步行腿</span>
    <span class="tag">双大钳</span>
    <span class="tag">4帧动画</span>
  </div>
  <p>最终版 1024×1024px 精灵表 · 2×2 四帧布局</p>
</div>

<script>
const lobster = document.getElementById('lobster');
const positions = ['0 0', '-100% 0', '0 -100%', '-100% -100%'];

function setFrame(index, btn) {
  lobster.style.objectPosition = positions[index];
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body>
</html>
