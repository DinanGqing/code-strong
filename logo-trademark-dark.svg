<svg viewBox="0 0 800 300" width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <title>码坚强 CODE STRONG 品牌标识 — 暗色底</title>
  <rect x="0" y="0" width="800" height="300" fill="#0a0a1a" rx="8"/>
  
  <defs>
    <style>
      .brand-cn { font: 800 52px system-ui, -apple-system, sans-serif; fill: #fff; letter-spacing: 8px; }
      .brand-code { font: 800 42px system-ui, -apple-system, sans-serif; fill: #EEEDFE; letter-spacing: 3px; }
      .brand-strong { font: 800 42px system-ui, -apple-system, sans-serif; fill: #AFA9EC; letter-spacing: 3px; }
      .brand-tag { font: 500 13px system-ui, -apple-system, sans-serif; fill: rgba(255,255,255,0.35); letter-spacing: 3px; }
      .brand-note { font: 400 9px system-ui, -apple-system, sans-serif; fill: rgba(255,255,255,0.25); }
    </style>
  </defs>

  <g transform="translate(80, 60)">
