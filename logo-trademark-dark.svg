      <path d="M 74 48 L 26 98 L 74 148" fill="none" stroke="#AFA9EC" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
      <rect x="85" y="42" width="34" height="10" rx="5" fill="#CECBF6" opacity="0.9"/>
      <rect x="26" y="158" width="93" height="6" rx="3" fill="#7F77DD" opacity="0.35"/>
    </g>
    <g transform="translate(160, 15)">
