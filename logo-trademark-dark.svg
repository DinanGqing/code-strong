      <circle cx="18" cy="140" r="4" fill="#7F77DD" opacity="0.85"/>
      <circle cx="30" cy="140" r="4" fill="#AFA9EC" opacity="0.8"/>
      <circle cx="42" cy="140" r="4" fill="#CECBF6" opacity="0.7"/>
      <circle cx="54" cy="140" r="4" fill="#D8D4F4" opacity="0.6"/>
      <circle cx="66" cy="140" r="4" fill="#EEEDFE" opacity="0.5"/>
