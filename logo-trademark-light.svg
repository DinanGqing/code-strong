<svg viewBox="0 0 800 300" width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <title>码坚强 CODE STRONG 品牌商标标识</title>
  <desc>码坚强 (Code Strong) — AI Agent Developer Community 注册商标</desc>
  
  <defs>
    <style>
      .brand-cn { font: 800 52px system-ui, -apple-system, sans-serif; fill: #1a1a2e; letter-spacing: 8px; }
      .brand-code { font: 800 42px system-ui, -apple-system, sans-serif; fill: #1a1a2e; letter-spacing: 3px; }
      .brand-strong { font: 800 42px system-ui, -apple-system, sans-serif; fill: #534AB7; letter-spacing: 3px; }
      .brand-tag { font: 500 13px system-ui, -apple-system, sans-serif; fill: #888780; letter-spacing: 3px; }
      .brand-note { font: 400 9px system-ui, -apple-system, sans-serif; fill: #aaa8a0; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 浅色底版本（注册商标主图） -->
  <rect x="0" y="0" width="800" height="300" fill="#fff" rx="8"/>
  
  <g transform="translate(80, 60)">
    <!-- V字提示符图标 -->
    <g id="icon">
      <path d="M 26 98 L 74 48 L 26 -2" fill="none" stroke="#534AB7" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
      <path d="M 74 48 L 26 98 L 74 148" fill="none" stroke="#534AB7" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
      <rect x="85" y="42" width="34" height="10" rx="5" fill="#7F77DD" opacity="0.9"/>
      <rect x="26" y="158" width="93" height="6" rx="3" fill="#1a1a2e" opacity="0.18"/>
    </g>

    <!-- 品牌文字 -->
    <g transform="translate(160, 15)">
      <text x="0" y="0" class="brand-cn">码坚强</text>
      <text x="0" y="46" class="brand-code">CODE</text>
      <text x="0" y="84" class="brand-strong">STRONG</text>
      <line x1="0" y1="102" x2="220" y2="102" stroke="#534AB7" stroke-width="2" opacity="0.6"/>
      <text x="0" y="124" class="brand-tag">AI AGENT DEVELOPER COMMUNITY</text>

      <!-- 信号点 -->
      <circle cx="6" cy="140" r="4" fill="#26215C" opacity="0.9"/>
      <circle cx="18" cy="140" r="4" fill="#3C3489" opacity="0.85"/>
      <circle cx="30" cy="140" r="4" fill="#534AB7" opacity="0.8"/>
      <circle cx="42" cy="140" r="4" fill="#7F77DD" opacity="0.7"/>
      <circle cx="54" cy="140" r="4" fill="#AFA9EC" opacity="0.6"/>
      <circle cx="66" cy="140" r="4" fill="#CECBF6" opacity="0.5"/>
    </g>

    <!-- 规格标注 -->
    <text x="0" y="210" class="brand-note">标准色：深紫 #534AB7　亮紫 #7F77DD　黑 #1a1a2e</text>
    <text x="0" y="224" class="brand-note">商标标识 · 码坚强 (Code Strong) · AI Agent Developer Community</text>
  </g>
</svg>
